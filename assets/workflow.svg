<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" width="900" height="540" style="font-family:Inter,Arial,sans-serif;">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="sheetGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="jobsGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7e22ce"/>
    </linearGradient>
    <linearGradient id="emailGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c084fc"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="540" fill="url(#bgGrad)" rx="16"/>

  <!-- Grid dots -->
  <pattern id="grid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="1" fill="#334155" opacity="0.5"/>
  </pattern>
  <rect width="900" height="540" fill="url(#grid)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="700" letter-spacing="1">&#x1F916; AI Job Agent &#x2014; Workflow</text>
  <text x="450" y="66" text-anchor="middle" fill="#94a3b8" font-size="13">Automated job discovery, AI matching &amp; personalised email delivery</text>

  <!-- STEP 1: Google Sheet -->
  <g filter="url(#shadow)">
    <rect x="40" y="110" width="160" height="130" rx="14" fill="url(#sheetGrad)" opacity="0.95"/>
  </g>
  <text x="120" y="162" text-anchor="middle" font-size="36">&#x1F4CA;</text>
  <text x="120" y="190" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Google Sheets</text>
  <text x="120" y="208" text-anchor="middle" fill="#bbf7d0" font-size="11">User Profiles</text>
  <text x="120" y="222" text-anchor="middle" fill="#bbf7d0" font-size="11">Name &#183; Role &#183; Skills</text>
  <text x="120" y="258" text-anchor="middle" fill="#64748b" font-size="11">Step 1 &#183; Data Source</text>

  <!-- STEP 2: Job Fetcher -->
  <g filter="url(#shadow)">
    <rect x="260" y="110" width="160" height="130" rx="14" fill="url(#jobsGrad)" opacity="0.95"/>
  </g>
  <text x="340" y="162" text-anchor="middle" font-size="36">&#x1F50D;</text>
  <text x="340" y="190" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Job Fetcher</text>
  <text x="340" y="208" text-anchor="middle" fill="#bfdbfe" font-size="11">Indeed &#183; Naukri</text>
  <text x="340" y="222" text-anchor="middle" fill="#bfdbfe" font-size="11">RSS + Web Scraping</text>
  <text x="340" y="258" text-anchor="middle" fill="#64748b" font-size="11">Step 2 &#183; Data Collection</text>

  <!-- STEP 3: AI Matching -->
  <g filter="url(#shadow)">
    <rect x="480" y="110" width="160" height="130" rx="14" fill="url(#aiGrad)" opacity="0.95"/>
  </g>
  <text x="560" y="162" text-anchor="middle" font-size="36">&#x1F9E0;</text>
  <text x="560" y="190" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">AI Matching</text>
  <text x="560" y="208" text-anchor="middle" fill="#e9d5ff" font-size="11">Groq &#183; LLaMA 3.1</text>
  <text x="560" y="222" text-anchor="middle" fill="#e9d5ff" font-size="11">Score &amp; Rank Jobs</text>
  <text x="560" y="258" text-anchor="middle" fill="#64748b" font-size="11">Step 3 &#183; Intelligence</text>

  <!-- STEP 4: Email -->
  <g filter="url(#shadow)">
    <rect x="700" y="110" width="160" height="130" rx="14" fill="url(#emailGrad)" opacity="0.95"/>
  </g>
  <text x="780" y="162" text-anchor="middle" font-size="36">&#x1F4E7;</text>
  <text x="780" y="190" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Email Delivery</text>
  <text x="780" y="208" text-anchor="middle" fill="#fed7aa" font-size="11">Gmail &#183; Nodemailer</text>
  <text x="780" y="222" text-anchor="middle" fill="#fed7aa" font-size="11">HTML Rich Email</text>
  <text x="780" y="258" text-anchor="middle" fill="#64748b" font-size="11">Step 4 &#183; Delivery</text>

  <!-- Arrows -->
  <line x1="202" y1="175" x2="256" y2="175" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="422" y1="175" x2="476" y2="175" stroke="#c084fc" stroke-width="2.5" marker-end="url(#arrowPurple)"/>
  <line x1="642" y1="175" x2="696" y2="175" stroke="#fb923c" stroke-width="2.5" marker-end="url(#arrowOrange)"/>

  <!-- Divider -->
  <line x1="60" y1="290" x2="840" y2="290" stroke="#334155" stroke-width="1"/>
  <text x="450" y="313" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600" letter-spacing="1">HOW IT WORKS</text>

  <!-- Detail Box 1 -->
  <rect x="40" y="325" width="190" height="155" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="135" y="349" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="700">&#x2460; Read User Profiles</text>
  <text x="135" y="368" text-anchor="middle" fill="#94a3b8" font-size="11">Loads all users from the</text>
  <text x="135" y="383" text-anchor="middle" fill="#94a3b8" font-size="11">Google Sheets spreadsheet</text>
  <text x="135" y="398" text-anchor="middle" fill="#94a3b8" font-size="11">including role, skills,</text>
  <text x="135" y="413" text-anchor="middle" fill="#94a3b8" font-size="11">experience &amp; preferences.</text>
  <text x="135" y="436" text-anchor="middle" fill="#22c55e" font-size="20">&#x1F4CB;</text>
  <text x="135" y="464" text-anchor="middle" fill="#475569" font-size="10">GoogleAuth &#183; Sheets API v4</text>

  <!-- Detail Box 2 -->
  <rect x="250" y="325" width="190" height="155" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="345" y="349" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700">&#x2461; Fetch Live Jobs</text>
  <text x="345" y="368" text-anchor="middle" fill="#94a3b8" font-size="11">Pulls fresh job listings per</text>
  <text x="345" y="383" text-anchor="middle" fill="#94a3b8" font-size="11">user from Indeed (RSS) and</text>
  <text x="345" y="398" text-anchor="middle" fill="#94a3b8" font-size="11">Naukri with dedup &amp;</text>
  <text x="345" y="413" text-anchor="middle" fill="#94a3b8" font-size="11">Google fallback support.</text>
  <text x="345" y="436" text-anchor="middle" fill="#3b82f6" font-size="20">&#x1F310;</text>
  <text x="345" y="464" text-anchor="middle" fill="#475569" font-size="10">rss-parser &#183; axios &#183; cheerio</text>

  <!-- Detail Box 3 -->
  <rect x="460" y="325" width="190" height="155" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="555" y="349" text-anchor="middle" fill="#c084fc" font-size="12" font-weight="700">&#x2462; AI Rank &amp; Score</text>
  <text x="555" y="368" text-anchor="middle" fill="#94a3b8" font-size="11">LLaMA 3.1 evaluates every</text>
  <text x="555" y="383" text-anchor="middle" fill="#94a3b8" font-size="11">job against the user profile,</text>
  <text x="555" y="398" text-anchor="middle" fill="#94a3b8" font-size="11">scores 0&#x2013;100% and picks</text>
  <text x="555" y="413" text-anchor="middle" fill="#94a3b8" font-size="11">the top 5 best matches.</text>
  <text x="555" y="436" text-anchor="middle" fill="#a855f7" font-size="20">&#x1F916;</text>
  <text x="555" y="464" text-anchor="middle" fill="#475569" font-size="10">Groq API &#183; LLaMA-3.1-8b</text>

  <!-- Detail Box 4 -->
  <rect x="670" y="325" width="190" height="155" rx="10" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
  <text x="765" y="349" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="700">&#x2463; Send Rich Email</text>
  <text x="765" y="368" text-anchor="middle" fill="#94a3b8" font-size="11">Delivers a beautifully</text>
  <text x="765" y="383" text-anchor="middle" fill="#94a3b8" font-size="11">formatted HTML email with</text>
  <text x="765" y="398" text-anchor="middle" fill="#94a3b8" font-size="11">job title, match score,</text>
  <text x="765" y="413" text-anchor="middle" fill="#94a3b8" font-size="11">summary &amp; apply link.</text>
  <text x="765" y="436" text-anchor="middle" fill="#f97316" font-size="20">&#x2709;&#xFE0F;</text>
  <text x="765" y="464" text-anchor="middle" fill="#475569" font-size="10">Gmail SMTP &#183; Nodemailer</text>

  <!-- Footer -->
  <text x="450" y="518" text-anchor="middle" fill="#475569" font-size="11">Built with Node.js &#183; Groq AI &#183; Google Sheets API &#183; Nodemailer</text>
</svg>
